<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seccion2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="pilotos" class="seccion">
        <h2>Registro de pilotos</h2>


        <form id="formPiloto">
            <input type="text" id="nombre" placeholder="Nombre" required>

            <input type="text" id="rango" placeholder="Rango" required>

            <select id="nave" required>
                <option value="">Selecciona nave</option>
            </select>

            <input type="number" id="victorias" placeholder="Victorias" min="0" required>

            <select id="estado" required>
                <option value="">Estado</option>
                <option value="activo">Activo</option>
                <option value="herido">Herido</option>
                <option value="KIA">KIA</option>
            </select>

            <button type="submit">Guardar piloto</button>
        </form>

    
        <table>
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Rango</th>
                <th>Nave</th>
                <th>Victorias</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="listaPilotos"></tbody>
        </table>
    </section>
<script src="script.js"></script>
</body>
</html>
