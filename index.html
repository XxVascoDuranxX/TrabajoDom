<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body class="cargando">
    <header>
        <nav>
            <ul>
                <li><a href="">
                    <img src="" alt="Logo Hangar" id="logoNav">
                    Hangar de Naves
                </a></li>
                <li><a href="">
                    <img src="" alt="Logo Piloto" id="logoNav">
                    Registro de Pilotos
                </a></li>
                <li>
                    <a href="">
                        <img src="" alt="Logo Alianza" id="logoNav">
                        Mando de la Alianza
                    </a>
                </li>
                <li><a href="">
                    <img src="" alt="Logo Mision" id="logoNav">
                    Panel de misiones
                </a></li>
            </ul>
        </nav>
    </header>


    <br>
    
    
    <div id ="Seccion1">
        <h1>Hangar de Naves</h1>

        <input type="text" id="buscador" placeholder="Buscar nave...">

        <label for="filtroTipo">Filter by:</label>
        <select id="filtroTipo">
            <option value="Todos">Todos</option>
        </select>

        <button id="ordenar">Ordenar por velocidad</button>

        <p id="contador"></p>

        <div id="contenedorNaves"></div>
    </div>


    <br>


    <div id="Seccion2">
        <h1>Registro de pilotos</h1>

        <form id="formPiloto">
            <input type="text" id="nombre" placeholder="Nombre" required>

            <input type="text" id="rango" placeholder="Rango" required>

            <select id="nave" required>
                <option value="">Selecciona nave</option>
            </select>

            <input type="number" id="victorias" placeholder="Victorias" min="0" required>

            <select id="estado" required>
                <option value="">Estado</option>
                <option value="activo">Activo</option>
                <option value="herido">Herido</option>
                <option value="KIA">KIA</option>
            </select>

            <button type="submit">Guardar piloto</button>
        </form>
    
        <table>
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Rango</th>
                <th>Nave</th>
                <th>Victorias</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="listaPilotos"></tbody>
        </table>
    </div>


    <br>


<div id="Seccion3">
    <h1>Tablero de misiones</h1>

    <input type="text" id="nombreMision" placeholder="Nombre en clave de mision">
    <input type="text" id="descripcionMision" placeholder="Breve descripcion de la mision">

    <select id="selectPiloto">
        <option value="default">Selecciona al piloto</option>
    </select>

    <select id="selectDificultad">
        <option value="default">Selecciona la dificultad</option>
        <option value="facil">Facil</option>
        <option value="media">Media</option>
        <option value="dificil">Dificil</option>
        <option value="suicida">Suicida</option>
    </select>

    <button id="btnAñadirMision" type="button">Añadir misión</button>

    <br><br>

    <select id="filtroDificultad">
        <option value="default">Filtra por dificultad</option>
        <option value="facil">Facil</option>
        <option value="media">Media</option>
        <option value="dificil">Dificil</option>
        <option value="suicida">Suicida</option>
    </select>

    <br><br>

    <div>
        <h2>To Do</h2>
        <hr>
        <div class="columna" data-estado="todo"></div>
    </div>

    <div>
        <h2>In Progress</h2>
        <hr>
        <div class="columna" data-estado="in_progress"></div>
    </div>

    <div>
        <h2>Done</h2>
        <hr>
        <div class="columna" data-estado="done"></div>
    </div>
</div>


    <br>

    
    <div id="Seccion4">

    </div>
    
    <script src="index.js"></script>
</body>
</html>
